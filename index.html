<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたにぴったりのカフェメニュー診断</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5efe6;
    --espresso: #2c1810;
    --latte: #c4956a;
    --foam: #faf6f0;
    --mocha: #6b3f2a;
    --mint: #4a7c6f;
    --caramel: #d4a853;
    --rose: #c17b7b;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background-color: var(–cream);
color: var(–espresso);
font-family: ‘Noto Serif JP’, serif;
min-height: 100vh;
overflow-x: hidden;
}

/* Grain overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 100;
opacity: 0.5;
}

.container {
max-width: 680px;
margin: 0 auto;
padding: 2rem 1.5rem 4rem;
}

/* Header */
header {
text-align: center;
padding: 3rem 0 2.5rem;
position: relative;
}

.cafe-icon {
font-size: 2.5rem;
display: block;
margin-bottom: 1rem;
animation: steam 3s ease-in-out infinite;
}

@keyframes steam {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-6px); }
}

header h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(1.5rem, 5vw, 2.2rem);
font-weight: 700;
line-height: 1.3;
color: var(–espresso);
margin-bottom: 0.5rem;
}

header h1 em {
font-style: italic;
color: var(–mocha);
}

header p {
font-size: 0.85rem;
color: var(–latte);
font-weight: 300;
letter-spacing: 0.05em;
}

.divider {
display: flex;
align-items: center;
gap: 1rem;
margin: 1.5rem 0;
}

.divider::before, .divider::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–latte);
opacity: 0.4;
}

.divider span {
color: var(–latte);
font-size: 0.7rem;
letter-spacing: 0.2em;
text-transform: uppercase;
}

/* Progress */
.progress-wrap {
margin-bottom: 2rem;
}

.progress-info {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 0.5rem;
font-size: 0.75rem;
color: var(–latte);
font-weight: 300;
}

.progress-bar {
height: 3px;
background: rgba(196, 149, 106, 0.2);
border-radius: 99px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–latte), var(–caramel));
border-radius: 99px;
transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Question card */
.question-card {
background: var(–foam);
border-radius: 20px;
padding: 2rem;
box-shadow: 0 8px 40px rgba(44, 24, 16, 0.08), 0 2px 8px rgba(44, 24, 16, 0.04);
animation: fadeUp 0.5s ease forwards;
border: 1px solid rgba(196, 149, 106, 0.15);
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.q-number {
font-size: 0.7rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–latte);
margin-bottom: 0.75rem;
display: block;
}

.q-text {
font-size: clamp(1rem, 3vw, 1.15rem);
font-weight: 600;
line-height: 1.6;
margin-bottom: 1.5rem;
color: var(–espresso);
}

/* Options */
.options {
display: flex;
flex-direction: column;
gap: 0.75rem;
}

.option-btn {
background: white;
border: 1.5px solid rgba(196, 149, 106, 0.25);
border-radius: 12px;
padding: 0.9rem 1.2rem;
text-align: left;
cursor: pointer;
font-family: ‘Noto Serif JP’, serif;
font-size: 0.9rem;
color: var(–espresso);
transition: all 0.25s ease;
display: flex;
align-items: center;
gap: 0.75rem;
}

.option-btn:hover {
border-color: var(–latte);
background: rgba(196, 149, 106, 0.06);
transform: translateX(4px);
}

.option-btn.selected {
border-color: var(–latte);
background: rgba(196, 149, 106, 0.12);
}

.opt-icon {
font-size: 1.1rem;
flex-shrink: 0;
}

/* Start / Result screens */
.screen {
text-align: center;
animation: fadeUp 0.6s ease forwards;
}

.start-btn, .retry-btn {
display: inline-block;
margin-top: 2rem;
padding: 0.9rem 2.5rem;
background: var(–espresso);
color: var(–cream);
border: none;
border-radius: 99px;
font-family: ‘Noto Serif JP’, serif;
font-size: 0.95rem;
cursor: pointer;
letter-spacing: 0.05em;
transition: all 0.3s ease;
box-shadow: 0 4px 20px rgba(44, 24, 16, 0.25);
}

.start-btn:hover, .retry-btn:hover {
background: var(–mocha);
transform: translateY(-2px);
box-shadow: 0 8px 30px rgba(44, 24, 16, 0.3);
}

.start-desc {
font-size: 0.9rem;
line-height: 1.8;
color: var(–mocha);
font-weight: 300;
max-width: 420px;
margin: 0 auto;
}

/* Result */
.result-emoji {
font-size: 4rem;
display: block;
margin: 1rem auto;
animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes pop {
0% { transform: scale(0); }
100% { transform: scale(1); }
}

.result-label {
font-size: 0.75rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–latte);
margin-bottom: 0.5rem;
}

.result-title {
font-family: ‘Playfair Display’, serif;
font-size: clamp(1.8rem, 6vw, 2.8rem);
font-weight: 700;
color: var(–espresso);
margin-bottom: 0.5rem;
}

.result-subtitle {
font-style: italic;
color: var(–mocha);
font-size: 1rem;
margin-bottom: 1.5rem;
}

.result-desc {
background: var(–foam);
border: 1px solid rgba(196, 149, 106, 0.2);
border-radius: 16px;
padding: 1.5rem;
font-size: 0.9rem;
line-height: 1.9;
color: var(–espresso);
text-align: left;
margin-bottom: 1.5rem;
}

.result-tags {
display: flex;
flex-wrap: wrap;
gap: 0.5rem;
justify-content: center;
margin-bottom: 0.5rem;
}

.tag {
padding: 0.3rem 0.9rem;
border-radius: 99px;
font-size: 0.75rem;
font-weight: 600;
letter-spacing: 0.05em;
}

.hidden { display: none; }
</style>

</head>

let currentQ = 0;
let scores = { classic: 0, hot: 0, sweet: 0, strong: 0, cold: 0, trendy: 0, smooth: 0 };

function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-number').textContent = `Question ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease forwards';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-icon">${opt.icon}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(opt.scores);
    opts.appendChild(btn);
  });
}

function selectOption(optScores) {
  Object.entries(optScores).forEach(([key, val]) => {
    scores[key] = (scores[key] || 0) + val;
  });
  currentQ++;
  if (currentQ < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('progress-fill').style.width = '100%';

  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];

  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-subtitle').textContent = r.subtitle;
  document.getElementById('result-desc').textContent = r.desc;

  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = '';
  r.tags.forEach((tag, i) => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = `# ${tag}`;
    span.style.background = r.tagColors[i] + '18';
    span.style.color = r.tagColors[i];
    span.style.border = `1px solid ${r.tagColors[i]}40`;
    tagsEl.appendChild(span);
  });

  const res = document.getElementById('result-screen');
  res.classList.remove('hidden');
  res.style.animation = 'none';
  res.offsetHeight;
  res.style.animation = 'fadeUp 0.6s ease forwards';
}

function retryQuiz() {
  currentQ = 0;
  scores = { classic: 0, hot: 0, sweet: 0, strong: 0, cold: 0, trendy: 0, smooth: 0 };
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQuestion();
}
</script>
